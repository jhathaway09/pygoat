stages:
  - test

bandit-sast:
  stage: test
  image: python:3.9
  before_script:
    - pip install bandit
  script:
    # This creates a file named like: bandit-report-1234567.txt
    - bandit -r . -f txt -o bandit-report-$CI_JOB_ID.txt
  artifacts:
    when: always
    paths:
      # Use a wildcard (*) so GitLab finds the file regardless of the ID number
      - bandit-report-*.txt
    expire_in: 1 week
  rules:
    - when: always