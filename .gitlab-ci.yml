stages:
  - test

bandit-sast:
  stage: test
  image: python:3.9
  before_script:
    - pip install bandit
  script:
    # We use a subshell or a variable to ensure the report prints even if Bandit fails
    - bandit -r . -f txt -o bandit-report-$CI_JOB_ID.txt || EXIT_CODE=$?
    - cat bandit-report-$CI_JOB_ID.txt
    # This line manually fails the job if Bandit found something (exit code wasn't 0)
    - if [ "$EXIT_CODE" -ne 0 ]; then exit $EXIT_CODE; fi
  artifacts:
    when: always
    paths:
      - bandit-report-*.txt
    expire_in: 1 week
  rules:
    - when: always